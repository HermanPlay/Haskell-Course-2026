name:                project
version:             0.1.0.0
github:              "githubuser/project"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

description:         "BlockChainLang: a small DSL for smart contracts."

library:
  source-dirs: src
  dependencies:
    - base >= 4.7 && < 5
    - containers
    - text
  default-extensions:
    - LambdaCase
    - BangPatterns
    - ScopedTypeVariables
    - DerivingStrategies
    - ImportQualifiedPost
  ghc-options:
    - -Wall
    - -Wcompat
    - -Widentities
    - -Wincomplete-record-updates
    - -Wincomplete-uni-patterns
    - -Wmissing-export-lists
    - -Wmissing-home-modules
    - -Wpartial-fields
    - -Wredundant-constraints
    - -fwrite-ide-info
    - -hiedir=.hie

executables:
  project-exe:
    main:                Main.hs
    source-dirs:         app
    dependencies:
      - project
      - base >= 4.7 && < 5
      - containers
      - text
    default-extensions:
      - LambdaCase
      - BangPatterns
      - ScopedTypeVariables
      - DerivingStrategies
      - ImportQualifiedPost
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -Wall
      - -Wcompat
      - -Widentities
      - -Wincomplete-record-updates
      - -Wincomplete-uni-patterns
      - -Wmissing-export-lists
      - -Wmissing-home-modules
      - -Wpartial-fields
      - -Wredundant-constraints
      - -fwrite-ide-info
      - -hiedir=.hie

tests:
  project-test:
    main:                Spec.hs
    source-dirs:         test
    dependencies:
      - project
      - hspec
      - QuickCheck
      - base >= 4.7 && < 5
      - containers
      - text
    default-extensions:
      - LambdaCase
      - BangPatterns
      - ScopedTypeVariables
      - DerivingStrategies
      - ImportQualifiedPost
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -fwrite-ide-info
      - -hiedir=.hie